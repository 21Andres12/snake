<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{background:#0f172a;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px}
h1{font-size:28px}
#gameContainer{position:relative}
canvas{background:#020617;border:3px solid #38bdf8;border-radius:8px}
#scoreBoard{display:flex;gap:20px;font-size:18px}
#controls{display:none;gap:10px;margin-top:10px}
.ctrl{width:60px;height:60px;background:#1e293b;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #38bdf8;user-select:none}
.ctrl:active{background:#38bdf8}
@media (max-width:768px){
#controls{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;justify-content:center}
#up{grid-column:2}
#left{grid-row:2}
#down{grid-column:2;grid-row:2}
#right{grid-column:3;grid-row:2}
}
</style>
</head>
<body>
<h1>Snake</h1>
<div id="scoreBoard">
<div>Puntos: <span id="score">0</span></div>
<div>Record: <span id="highScore">0</span></div>
</div>
<div id="gameContainer">
<canvas id="game" width="400" height="400"></canvas>
</div>
<div id="controls">
<div></div>
<div class="ctrl" id="up">▲</div>
<div></div>
<div class="ctrl" id="left">◀</div>
<div class="ctrl" id="down">▼</div>
<div class="ctrl" id="right">▶</div>
</div>
<script>
const canvas=document.getElementById('game')
const ctx=canvas.getContext('2d')
const grid=20
const tileCount=canvas.width/grid
let snake=[{x:10,y:10}]
let velocityX=0
let velocityY=0
let food={x:5,y:5}
let score=0
let highScore=localStorage.getItem('snakeHighScore')||0
const scoreEl=document.getElementById('score')
const highScoreEl=document.getElementById('highScore')
highScoreEl.textContent=highScore

function randomFood(){
food.x=Math.floor(Math.random()*tileCount)
food.y=Math.floor(Math.random()*tileCount)
}

function gameLoop(){
update()
render()
}

function update(){
const head={x:snake[0].x+velocityX,y:snake[0].y+velocityY}
snake.unshift(head)

if(head.x===food.x&&head.y===food.y){
score++
scoreEl.textContent=score
randomFood()
}else{
snake.pop()
}

if(head.x<0||head.y<0||head.x>=tileCount||head.y>=tileCount){
resetGame()
}

for(let i=1;i<snake.length;i++){
if(head.x===snake[i].x&&head.y===snake[i].y){
resetGame()
}
}
}

function render(){
ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#22c55e"
for(const part of snake){
ctx.fillRect(part.x*grid,part.y*grid,grid-2,grid-2)
}

ctx.fillStyle="#ef4444"
ctx.fillRect(food.x*grid,food.y*grid,grid-2,grid-2)
}

function resetGame(){
if(score>highScore){
highScore=score
localStorage.setItem('snakeHighScore',highScore)
highScoreEl.textContent=highScore
}
score=0
scoreEl.textContent=0
snake=[{x:10,y:10}]
velocityX=0
velocityY=0
randomFood()
}

function changeDirection(x,y){
if(-x===velocityX&&-y===velocityY)return
velocityX=x
velocityY=y
}

document.addEventListener('keydown',e=>{
switch(e.key){
case 'ArrowUp': changeDirection(0,-1); break
case 'ArrowDown': changeDirection(0,1); break
case 'ArrowLeft': changeDirection(-1,0); break
case 'ArrowRight': changeDirection(1,0); break
}
})

// mobile controls
const up=document.getElementById('up')
const down=document.getElementById('down')
const left=document.getElementById('left')
const right=document.getElementById('right')

up?.addEventListener('touchstart',()=>changeDirection(0,-1))
down?.addEventListener('touchstart',()=>changeDirection(0,1))
left?.addEventListener('touchstart',()=>changeDirection(-1,0))
right?.addEventListener('touchstart',()=>changeDirection(1,0))

// swipe mobile
let startX=0
let startY=0
canvas.addEventListener('touchstart',e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

canvas.addEventListener('touchend',e=>{
let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

if(Math.abs(dx)>Math.abs(dy)){
if(dx>0) changeDirection(1,0)
else changeDirection(-1,0)
}else{
if(dy>0) changeDirection(0,1)
else changeDirection(0,-1)
}
})

setInterval(gameLoop,120)
randomFood()
</script>
</body>
</html>
